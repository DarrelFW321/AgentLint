name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify tag and package version
        run: |
          PACKAGE_VERSION=$(python -c "exec(open('src/agentlint/version.py').read()); print(__version__)")
          test "${GITHUB_REF_NAME}" = "v${PACKAGE_VERSION}"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  smoke:
    name: Python ${{ matrix.python-version }} / OpenAI Agents ${{ matrix.openai-agents-version }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        openai-agents-version: ["0.18.0", "0.18.2"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Test installed wheel
        run: >-
          python scripts/test_wheel.py dist/*.whl
          --openai-agents-version ${{ matrix.openai-agents-version }}

  publish:
    name: Publish to PyPI
    needs: smoke
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
